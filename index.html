<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIT Time Shifter (v21.195.00 Fixed)</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 550px; margin: 0 auto; background: #f8f9fa; }
        .card { border: 1px solid #ddd; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: bold; text-align: center; }
        .error { background: #fee; color: #d00; border: 1px solid #fcc; }
        .success { background: #efe; color: #2d6a4f; border: 1px solid #cfc; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        input { padding: 10px; margin-bottom: 15px; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1>FIT Time Shifter</h1>
    <div class="card">
        <label>1. Select .fit file:</label>
        <input type="file" id="fileInput" accept=".fit">
        <label>2. Shift seconds:</label>
        <input type="number" id="offset" value="0">
        <button id="runBtn">Adjust and Download</button>
    </div>

    <div id="statusBox" class="status">Ready</div>

    <script type="module">
        import { Decoder, Stream, Encoder, Utils } from './index.js?v=21.195.00';

        const statusBox = document.getElementById('statusBox');
        const runBtn = document.getElementById('runBtn');

        runBtn.addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const offset = parseInt(document.getElementById('offset').value) || 0;

            if (fileInput.files.length === 0) return alert("Select a file!");
            
            runBtn.disabled = true;
            statusBox.innerHTML = "⏳ Processing records...";
            statusBox.className = "status";

            try {
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                const stream = Stream.fromArrayBuffer(arrayBuffer);
                const decoder = new Decoder(stream);
                const encoder = new Encoder();
                let count = 0;

                // FIX: Use the standard read() with a listener object
                decoder.read({
                    convertTimestamp: false, // KEEP RAW: Encoder hates Date objects
                    convertUnits: false,     // KEEP RAW: Encoder hates strings like "km/h"
                    expandComponents: false, // KEEP RAW: Prevent "virtual" fields
                    mesgListener: (mesgNum, message) => {
                        
                        // 1. Apply time shift to raw numbers
                        if (message.timestamp !== undefined) message.timestamp += offset;
                        if (message.startTime !== undefined) message.startTime += offset;
                        if (message.startDate !== undefined) message.startDate += offset;

                        // 2. CRITICAL CLEAN: Strip metadata added by the decoder
                        if (Utils && Utils.removeExpandedFields) {
                            Utils.removeExpandedFields(message);
                        }

                        // 3. MANUAL CLEAN: Delete "virtual" fields that break the Encoder
                        for (const key in message) {
                            if (key.endsWith('_date') || key.endsWith('_units') || key.includes('enhanced_')) {
                                delete message[key];
                            }
                        }

                        try {
                            // 4. WRITE: Pass the ID and the clean message
                            encoder.onMesg(mesgNum, message);
                            count++;
                        } catch (e) {
                            console.warn(`Record ${mesgNum} rejected: ${e.message}`);
                        }
                    }
                });

                // 5. FINALIZE
                const result = encoder.close();

                if (count === 0) throw new Error("Encoder rejected all records. Check Console (F12).");

                const blob = new Blob([result], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `shifted_${file.name}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                statusBox.innerHTML = `✅ Success! Wrote ${count} records.`;
                statusBox.className = "status success";

            } catch (err) {
                console.error("SDK Process Error:", err);
                statusBox.innerHTML = "❌ Error: " + err.message;
                statusBox.className = "status error";
            } finally {
                runBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
