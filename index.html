<script type="module">
    import { Decoder, Stream, Encoder, Profile } from './index.js?v=21.195.00';

    const statusBox = document.getElementById('statusBox');
    const runBtn = document.getElementById('runBtn');

    runBtn.addEventListener('click', async () => {
        const fileInput = document.getElementById('fileInput');
        const offset = parseInt(document.getElementById('offset').value) || 0;
        
        if (fileInput.files.length === 0) return alert("Select a file!");
        
        const file = fileInput.files[0]; // Fix: select the first file from the list
        statusBox.innerHTML = "⏳ Processing...";
        statusBox.className = "status";

        try {
            const arrayBuffer = await file.arrayBuffer();
            const stream = Stream.fromArrayBuffer(arrayBuffer);
            const decoder = new Decoder(stream);
            
            // Decode with raw values to prevent encoder rejection
            const { messages } = decoder.read({
                convertDateTimesToDates: false,
                convertUnits: false,
                expandComponents: false,
                applyScaleAndOffset: false 
            });

            const encoder = new Encoder();
            let count = 0;

            // Mapping camelCase keys to Profile.MesgNum constants
            const getMesgNum = (name) => {
                // Try converting camelCase to CONSTANT_CASE (e.g., fileId -> FILE_ID)
                const constantName = name.replace(/([A-Z])/g, "_$1").toUpperCase();
                return Profile.MesgNum[constantName] || Profile.MesgNum[name.toUpperCase()];
            };

            for (const [mesgName, mesgArray] of Object.entries(messages)) {
                const mesgNum = getMesgNum(mesgName);
                
                if (mesgNum === undefined) {
                    console.warn(`Unknown message type: ${mesgName}`);
                    continue;
                }

                mesgArray.forEach(msg => {
                    // Shift timestamp fields (raw integers)
                    const timeFields = ['timestamp', 'startTime', 'startDate', 'localTimestamp'];
                    timeFields.forEach(field => {
                        if (msg[field] !== undefined && typeof msg[field] === 'number') {
                            msg[field] += offset;
                        }
                    });

                    // Remove non-standard fields that cause Encoder failure
                    const cleanMsg = {};
                    for (const key in msg) {
                        if (key.startsWith('unknown') || key.endsWith('_units')) continue;
                        cleanMsg[key] = msg[key];
                    }

                    try {
                        encoder.onMesg(mesgNum, cleanMsg);
                        count++;
                    } catch (e) {
                        // If one record fails, we log it but keep going
                        console.error(`Encoder error in ${mesgName}:`, e.message, cleanMsg);
                    }
                });
            }

            const finalFit = encoder.close();
            
            if (count === 0) throw new Error("The Encoder rejected every record. Check Console (F12) for 'Encoder error' logs.");

            const blob = new Blob([finalFit], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `shifted_${file.name}`;
            a.click();

            statusBox.innerHTML = `✅ Success! Wrote ${count} records.`;
            statusBox.className = "status success";

        } catch (err) {
            console.error("Full Error Context:", err);
            statusBox.innerHTML = "❌ Error: " + err.message;
            statusBox.className = "status error";
        }
    });
</script>
