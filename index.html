<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIT Time Shifter (Deep Clean)</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 2rem; max-width: 500px; margin: 0 auto; background: #f4f7f6; }
        .card { border: 1px solid #ddd; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: bold; text-align: center; }
        .error { background: #fee; color: #d00; border: 1px solid #fcc; }
        .success { background: #efe; color: #2d6a4f; border: 1px solid #cfc; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        input { padding: 10px; margin-bottom: 15px; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1>FIT Time Shifter</h1>
    <div class="card">
        <label>1. Select .fit file:</label>
        <input type="file" id="fileInput" accept=".fit">
        <label>2. Shift seconds:</label>
        <input type="number" id="offset" value="0">
        <button id="runBtn">Sanitise and Download</button>
    </div>

    <div id="statusBox" class="status">Ready</div>

    <script type="module">
        import { Decoder, Stream, Encoder, Utils } from './index.js?v=deep_clean';

        const statusBox = document.getElementById('statusBox');
        const runBtn = document.getElementById('runBtn');

        runBtn.addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const offset = parseInt(document.getElementById('offset').value) || 0;

            if (fileInput.files.length === 0) return alert("Select a file!");
            const file = fileInput.files[0];

            statusBox.innerHTML = "⏳ Stripping expanded fields...";
            statusBox.className = "status";

            try {
                const arrayBuffer = await file.arrayBuffer();
                const stream = Stream.fromArrayBuffer(arrayBuffer);
                const decoder = new Decoder(stream);
                const encoder = new Encoder();
                let count = 0;

                // 1. Decoder MUST use raw settings for the encoder to accept data
                decoder.read({
                    convertTimestamp: false, 
                    convertUnits: false,
                    expandComponents: false,
                    mesgListener: (mesgNum, message) => {
                        // 2. SHIFT TIMESTAMPS (Raw FIT seconds)
                        if (message.timestamp !== undefined) message.timestamp += offset;
                        if (message.startTime !== undefined) message.startTime += offset;
                        if (message.startDate !== undefined) message.startDate += offset;

                        // 3. THE CRITICAL CLEAN: Strip everything that isn't a raw binary field
                        if (typeof Utils !== 'undefined' && Utils.removeExpandedFields) {
                            Utils.removeExpandedFields(message); // Standard SDK method
                        }
                        
                        // 4. MANUAL SANITISER: Delete any fields the Encoder might choke on
                        for (const key in message) {
                            // Delete virtual date fields added by some decoder versions
                            if (key.endsWith('_date') || key.endsWith('_units')) {
                                delete message[key];
                            }
                            // Delete non-numeric/string fields (objects/arrays) that break encoding
                            const val = message[key];
                            if (typeof val === 'object' && val !== null && !(val instanceof Array)) {
                                delete message[key];
                            }
                        }

                        try {
                            // 5. Official write method
                            encoder.onMesg(mesgNum, message);
                            count++;
                        } catch (e) {
                            console.warn(`Record ${mesgNum} rejected: ${e.message}`);
                        }
                    }
                });

                const result = encoder.close();

                if (count === 0) throw new Error("Encoder rejected all messages. Check console (F12).");

                const blob = new Blob([result], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "shifted_" + file.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                statusBox.innerHTML = `✅ Success! Wrote ${count} records.`;
                statusBox.className = "status success";

            } catch (err) {
                console.error("SDK Error Details:", err);
                statusBox.innerHTML = "❌ Error: " + err.message;
                statusBox.className = "status error";
            }
        });
    </script>
</body>
</html>
