<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIT Activity Editor: Precision Trim</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; background: #f8f9fa; }
        .card { border: 1px solid #ddd; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: bold; text-align: center; font-size: 0.9rem; }
        .error { background: #fee; color: #d00; border: 1px solid #fcc; }
        .success { background: #efe; color: #2d6a4f; border: 1px solid #cfc; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input { padding: 10px; margin-bottom: 15px; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
    </style>
</head>
<body>
    <h1>FIT Activity Editor</h1>
    <div class="card">
        <label>1. Select .fit file:</label>
        <input type="file" id="fileInput" accept=".fit">
        
        <div class="row">
            <div>
                <label>2. Shift Time (sec):</label>
                <input type="number" id="offset" value="0">
            </div>
            <div>
                <label>3. Trim Start (sec):</label>
                <input type="number" id="trimSec" value="0" min="0">
            </div>
        </div>
        
        <button id="runBtn">Process and Download</button>
    </div>
    <div id="statusBox" class="status">Ready</div>

    <script type="module">
        import { Decoder, Stream, Encoder } from './index.js?v=21.195.00';

        document.addEventListener('DOMContentLoaded', () => {
            const statusBox = document.getElementById('statusBox');
            const runBtn = document.getElementById('runBtn');

            runBtn.addEventListener('click', async () => {
                const fileInput = document.getElementById('fileInput');
                const offsetValue = parseInt(document.getElementById('offset').value) || 0;
                const trimValue = parseInt(document.getElementById('trimSec').value) || 0;
                
                if (!fileInput.files.length) return alert("Please select a file.");
                
                const file = fileInput.files[0];
                statusBox.innerHTML = "⏳ Processing...";
                statusBox.className = "status";

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const stream = Stream.fromArrayBuffer(arrayBuffer);
                    const decoder = new Decoder(stream);
                    const encoder = new Encoder();
                    
                    let count = 0;
                    let firstTimestamp = null;
                    let distanceOffset = 0;
                    let offsetLocked = false;
                    let recordsDropped = 0;

                    decoder.read({
                        applyScaleAndOffset: false,
                        convertDateTimesToDates: false,
                        convertUnits: false,
                        expandComponents: false,
                        mergeHeartRates: false,
                        mesgListener: (mesgNum, message) => {
                            // 1. Establish activity start time
                            if (message.timestamp && firstTimestamp === null) {
                                firstTimestamp = message.timestamp;
                            }

                            // 2. Trimming Logic
                            if (trimValue > 0 && message.timestamp) {
                                if (message.timestamp < (firstTimestamp + trimValue)) {
                                    // Update the cumulative distance offset while trimming
                                    if (message.distance !== undefined) {
                                        distanceOffset = message.distance;
                                    }
                                    recordsDropped++;
                                    return; // Skip this record
                                }
                            }

                            // 3. Lock the Distance Offset for remaining records
                            // This ensures the very first record after the trim is exactly 0.
                            if (!offsetLocked && message.distance !== undefined) {
                                distanceOffset = message.distance; 
                                offsetLocked = true;
                            }

                            // 4. Correct Cumulative Distance
                            if (message.distance !== undefined) {
                                message.distance = Math.max(0, message.distance - distanceOffset);
                            }

                            // 5. Correct Summary Distance (Session/Lap)
                            if (message.totalDistance !== undefined) {
                                message.totalDistance = Math.max(0, message.totalDistance - distanceOffset);
                            }

                            // 6. Time Shifting Logic (Apply to all date fields)
                            const timeFields = ['timestamp', 'startTime', 'startDate', 'localTimestamp'];
                            timeFields.forEach(f => {
                                if (message[f] !== undefined && typeof message[f] === 'number') {
                                    message[f] += offsetValue;
                                }
                            });

                            // 7. Clean and Encode (Note: Speed fields are left unchanged as requested)
                            const cleanMsg = {};
                            for (const key in message) {
                                if (!key.endsWith('_units') && !key.startsWith('unknown')) {
                                    cleanMsg[key] = message[key];
                                }
                            }

                            try {
                                encoder.onMesg(mesgNum, cleanMsg);
                                count++;
                            } catch (e) {
                                console.warn(`Encoder rejected record:`, e.message);
                            }
                        }
                    });

                    const finalFit = encoder.close();
                    if (count === 0) throw new Error("No records remained after processing.");

                    const blob = new Blob([finalFit], { type: "application/octet-stream" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `edited_${file.name}`;
                    a.click();

                    statusBox.innerHTML = `✅ Success! Processed ${count} records.`;
                    statusBox.className = "status success";

                } catch (err) {
                    console.error(err);
                    statusBox.innerHTML = "❌ Error: " + err.message;
                    statusBox.className = "status error";
                }
            });
        });
    </script>
</body>
</html>
