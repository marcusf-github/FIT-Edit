<script type="module">
    // Make sure to import ProtocolVersion from your SDK
    import { Decoder, Stream, Encoder, Profile, Utils, ProtocolVersion } from './index.js?v=21.195.00';

    const statusBox = document.getElementById('statusBox');
    const runBtn = document.getElementById('runBtn');

    runBtn.addEventListener('click', async () => {
        const fileInput = document.getElementById('fileInput');
        const offset = parseInt(document.getElementById('offset').value) || 0;

        if (fileInput.files.length === 0) return alert("Select a file!");
        const file = fileInput.files[0];

        statusBox.innerHTML = "⏳ Processing records...";
        statusBox.className = "status";

        try {
            const arrayBuffer = await file.arrayBuffer();
            const stream = Stream.fromArrayBuffer(arrayBuffer);
            const decoder = new Decoder(stream);
            
            // FIX 1: Initialize with Protocol V2.0 for modern compatibility
            const encoder = new Encoder(ProtocolVersion.V20);
            let count = 0;

            decoder.read({
                convertTimestamp: false, 
                convertUnits: false,
                expandComponents: false,
                mesgListener: (mesgNum, message) => {
                    // Shift timestamps
                    if (message.timestamp !== undefined) message.timestamp += offset;
                    if (message.startTime !== undefined) message.startTime += offset;
                    if (message.startDate !== undefined) message.startDate += offset;

                    // FIX 2: Strip computed/expanded fields that break the encoder
                    Utils.removeExpandedFields(message);

                    try {
                        encoder.onMesg(mesgNum, message);
                        count++;
                    } catch (e) {
                        // This will now log the EXACT field causing the problem
                        console.error(`Record ${mesgNum} rejected: ${e.message}`, e.cause);
                    }
                }
            });

            const result = encoder.close();
            if (count === 0) throw new Error("Encoder rejected all messages. Check console (F12) for details.");

            const blob = new Blob([result], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `shifted_${file.name}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            statusBox.innerHTML = `✅ Success! Wrote ${count} records.`;
            statusBox.className = "status success";

        } catch (err) {
            // Detailed error reporting
            console.error("Full SDK Error:", err);
            let causeMsg = err.cause ? JSON.stringify(err.cause) : "No extra cause info";
            statusBox.innerHTML = `❌ Error: ${err.message}. Cause: ${causeMsg}`;
            statusBox.className = "status error";
        }
    });
</script>
