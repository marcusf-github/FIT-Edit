<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIT Time Shifter (Safe Sync)</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 2rem; line-height: 1.5; max-width: 500px; margin: 0 auto; background: #f8f9fa; }
        .card { border: 1px solid #dee2e6; padding: 2rem; border-radius: 12px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; font-weight: bold; text-align: center; }
        .error { background: #fff5f5; color: #e03131; border: 1px solid #ffa8a8; }
        .success { background: #f4fce3; color: #2f9e44; border: 1px solid #b2f2bb; }
        .info { background: #e7f5ff; color: #1971c2; border: 1px solid #a5d8ff; }
        button { width: 100%; padding: 12px; background: #228be6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #1c7ed6; }
        input { padding: 10px; margin-bottom: 15px; width: 100%; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1>FIT Time Shifter</h1>
    <div class="card">
        <label>1. Select .fit file:</label>
        <input type="file" id="fileInput" accept=".fit">
        <label>2. Shift seconds:</label>
        <input type="number" id="offset" value="0">
        <button id="runBtn">Adjust and Download</button>
    </div>

    <div id="statusBox" class="status info">Ready</div>

    <script type="module">
        import { Decoder, Stream, Encoder, Utils } from './index.js?v=safesync';

        const statusBox = document.getElementById('statusBox');
        const runBtn = document.getElementById('runBtn');

        runBtn.addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const offset = parseInt(document.getElementById('offset').value) || 0;

            if (fileInput.files.length === 0) return alert("Please select a file!");

            statusBox.innerHTML = "⏳ Processing... please wait.";
            statusBox.className = "status info";

            try {
                const file = fileInput.files[0]; 
                const arrayBuffer = await file.arrayBuffer();
                const stream = Stream.fromArrayBuffer(arrayBuffer);
                const decoder = new Decoder(stream);
                const encoder = new Encoder();
                let count = 0;

                // CRITICAL: Options to prevent the decoder from creating complex objects
                // that the encoder cannot handle.
                decoder.read({
                    convertTimestamp: false, 
                    convertUnits: false,
                    expandComponents: false,
                    mesgListener: (mesgNum, message) => {
                        // 1. Shift the numeric timestamps
                        if (message.timestamp !== undefined) message.timestamp += offset;
                        if (message.startTime !== undefined) message.startTime += offset;
                        if (message.startDate !== undefined) message.startDate += offset;

                        // 2. Remove expanded fields (computed data) - This prevents re-encoding crashes
                        Utils.removeExpandedFields(message);

                        // 3. Encode the raw message
                        try {
                            encoder.onMesg(mesgNum, message);
                            count++;
                        } catch (e) {
                            console.warn("Skipped a record:", e.message);
                        }
                    }
                });

                // Finalize the file
                const result = encoder.close();

                if (result.length < 200) throw new Error("File empty - no records found.");

                // Trigger Download
                const blob = new Blob([result], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `shifted_${file.name}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                statusBox.innerHTML = `✅ Success! Adjusted ${count} records.`;
                statusBox.className = "status success";

            } catch (err) {
                console.error("SDK Process Error:", err);
                statusBox.innerHTML = "❌ Error: " + err.message;
                statusBox.className = "status error";
            }
        });
    </script>
</body>
</html>
