<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIT Time Shifter (Safe Mode)</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; line-height: 1.5; max-width: 500px; margin: 0 auto; background: #f0f2f5; }
        .card { border: 1px solid #ccc; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: bold; text-align: center; font-size: 0.9rem; }
        .error { background: #fee; color: #d00; border: 1px solid #fcc; }
        .success { background: #efe; color: #28a745; border: 1px solid #cfc; }
        .info { background: #eef; color: #007bff; border: 1px solid #ccf; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        input { padding: 10px; margin-bottom: 15px; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1>FIT Time Shifter</h1>
    <div class="card">
        <label>1. Select File:</label>
        <input type="file" id="fileInput" accept=".fit">
        <label>2. Shift Seconds:</label>
        <input type="number" id="offset" value="0">
        <button id="runBtn">Start Processing</button>
    </div>

    <div id="statusBox" class="status info">Ready</div>

    <script type="module">
        import { Decoder, Stream, Encoder } from './index.js?v=final_safe';

        const statusBox = document.getElementById('statusBox');
        const runBtn = document.getElementById('runBtn');

        runBtn.addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const offset = parseInt(document.getElementById('offset').value) || 0;

            if (fileInput.files.length === 0) return alert("Please select a file!");

            const file = fileInput.files[0]; // Targeted correctly
            statusBox.innerHTML = "⏳ Processing...";
            statusBox.className = "status info";

            try {
                const arrayBuffer = await file.arrayBuffer();
                const stream = Stream.fromArrayBuffer(arrayBuffer);
                const decoder = new Decoder(stream);
                const encoder = new Encoder();
                let count = 0;

                // SAFE READ: No while loop. We use the standard read() 
                // but pass a listener to catch data as it flows.
                decoder.read({
                    mesgListener: (mesgNum, message) => {
                        // Apply time shift
                        if (message.timestamp !== undefined) message.timestamp += offset;
                        if (message.startTime !== undefined) message.startTime += offset;
                        if (message.startDate !== undefined) message.startDate += offset;

                        // Force the ID into the message for the encoder
                        message.mesgNum = mesgNum;
                        
                        try {
                            encoder.onMesg(message);
                            count++;
                        } catch (e) {
                            // Fallback if the SDK is an older version
                            encoder.onMesg(mesgNum, message);
                            count++;
                        }
                    }
                });

                // Finalize the file
                const result = encoder.close();

                if (result.length < 200) {
                    throw new Error(`Output too small (${result.length} bytes). Encoder failed.`);
                }

                // Download Logic
                const blob = new Blob([result], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "shifted_" + file.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                statusBox.innerHTML = `✅ Success! Wrote ${count} records.`;
                statusBox.className = "status success";

            } catch (err) {
                console.error("Critical Error:", err);
                statusBox.innerHTML = "❌ Error: " + err.message;
                statusBox.className = "status error";
            }
        });
    </script>
</body>
</html>
