<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIT Time Shifter v21</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; background: #f4f7f6; }
        .card { border: 1px solid #ddd; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: bold; text-align: center; }
        .error { background: #fff0f0; color: #d00; border: 1px solid #fcc; }
        .success { background: #f0fff4; color: #2d6a4f; border: 1px solid #b7e4c7; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        input { padding: 10px; margin-bottom: 15px; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1>FIT Time Shifter</h1>
    <div class="card">
        <label for="fileInput">1. Select .fit file:</label>
        <input type="file" id="fileInput" accept=".fit">

        <label for="offset">2. Shift time (seconds):</label>
        <input type="number" id="offset" value="0">
        <p style="font-size: 0.8rem; color: #666; margin-top: -10px;">(e.g., 3600 = +1 hour, -60 = -1 minute)</p>
        
        <button id="runBtn">Shift and Download</button>
    </div>

    <div id="statusBox" class="status">Waiting for file...</div>

    <script type="module">
        // Import from your local index.js file
        import { Decoder, Stream, Encoder, Utils } from './index.js?v=21.195';

        const statusBox = document.getElementById('statusBox');
        const runBtn = document.getElementById('runBtn');

        runBtn.addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const offset = parseInt(document.getElementById('offset').value) || 0;

            if (fileInput.files.length === 0) return alert("Please select a file first.");

            runBtn.disabled = true;
            statusBox.innerHTML = "⏳ Processing records...";
            statusBox.className = "status";

            try {
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                const stream = Stream.fromArrayBuffer(arrayBuffer);
                const decoder = new Decoder(stream);
                const encoder = new Encoder();
                let count = 0;

                // 1. Mandatory RAW settings for re-encoding
                // If units or timestamps are converted, the encoder will reject the records.
                decoder.read({
                    convertTimestamp: false, 
                    convertUnits: false,
                    expandComponents: false,
                    mesgListener: (mesgNum, message) => {
                        // 2. SHIFT TIMESTAMPS
                        // Apply the shift only to raw numeric fields
                        if (message.timestamp !== undefined) message.timestamp += offset;
                        if (message.startTime !== undefined) message.startTime += offset;
                        if (message.startDate !== undefined) message.startDate += offset;

                        // 3. MANDATORY CLEAN: Strip expanded/computed fields
                        // This removes 'extra' metadata that causes the encoder to fail.
                        Utils.removeExpandedFields(message);

                        try {
                            // 4. WRITE: onMesg(mesgNum, data) is the standard method
                            encoder.onMesg(mesgNum, message);
                            count++;
                        } catch (writeErr) {
                            console.warn(`Record ${mesgNum} rejected: ${writeErr.message}`);
                        }
                    }
                });

                // 5. FINALIZE: Close the encoder to get the final binary blob
                const result = encoder.close();

                if (count === 0) throw new Error("Encoder rejected all messages. Check console (F12) for 'cause'.");

                const blob = new Blob([result], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `shifted_${file.name}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                statusBox.innerHTML = `✅ Success! Wrote ${count} records.`;
                statusBox.className = "status success";

            } catch (err) {
                console.error("SDK Error Details:", err);
                statusBox.innerHTML = "❌ Error: " + err.message;
                statusBox.className = "status error";
            } finally {
                runBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
