<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIT Time Shifter</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.5; max-width: 600px; margin: auto; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; background: #fafafa; }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: bold; }
        .error { background: #fee; color: #c00; border: 1px solid #fcc; }
        .success { background: #efe; color: #070; border: 1px solid #cfc; }
        button { width: 100%; padding: 12px; background: #007bff; color: #fff; border: none; cursor: pointer; border-radius: 5px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1>FIT Time Shifter</h1>
    <div class="card">
        <label>1. Select .fit file:</label>
        <input type="file" id="fileInput" accept=".fit">
        <label>2. Shift seconds (e.g., 3600 for +1hr):</label>
        <input type="number" id="offset" value="0">
        <button id="runBtn">Shift & Download</button>
    </div>

    <div id="statusBox" class="status">Testing SDK Connection...</div>

    <script type="module">
    import { Decoder, Stream, Encoder } from './index.js?v=final_fix';

    const statusBox = document.getElementById('statusBox');
    const runBtn = document.getElementById('runBtn');

    runBtn.addEventListener('click', async () => {
        const fileInput = document.getElementById('fileInput');
        const offset = parseInt(document.getElementById('offset').value) || 0;

        if (fileInput.files.length === 0) return alert("Select a file first.");

        statusBox.innerHTML = "⏳ Processing...";
        statusBox.className = "status";

        try {
            const file = fileInput.files[0]; // Ensure we get the single file
            const arrayBuffer = await file.arrayBuffer();
            const stream = Stream.fromArrayBuffer(arrayBuffer);
            const decoder = new Decoder(stream);
            const encoder = new Encoder();

            let count = 0;

            // Use the BROADCAST listener - this is the most reliable way 
            // to pipe data from Decoder to Encoder in the JS SDK.
            decoder.read({
                mesgListener: (mesgNum, message) => {
                    // 1. Shift the timestamps
                    if (message.timestamp !== undefined) message.timestamp += offset;
                    if (message.startTime !== undefined) message.startTime += offset;
                    if (message.startDate !== undefined) message.startDate += offset;

                    // 2. IMPORTANT: Use onMesg with the ID. 
                    // This automatically handles Definition Messages.
                    encoder.onMesg(mesgNum, message);
                    count++;
                }
            });

            // 3. Finalize
            const result = encoder.close();

            if (result.length < 100) {
                throw new Error(`File too small (${result.length} bytes). Encoder failed.`);
            }

            const blob = new Blob([result], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "shifted_" + file.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            statusBox.innerHTML = `✅ Success! Wrote ${count} records. (${(result.length/1024).toFixed(1)} KB)`;
            statusBox.className = "status success";

        } catch (err) {
            console.error(err);
            statusBox.innerHTML = "❌ Error: " + err.message;
            statusBox.className = "status error";
        }
    });
</script>

</body>
</html>
