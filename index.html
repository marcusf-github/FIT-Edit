<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIT Time Shifter (Final Fix)</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 500px; margin: 0 auto; background: #f8f9fa; }
        .card { border: 1px solid #ddd; padding: 2rem; border-radius: 12px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; font-weight: bold; text-align: center; }
        .error { background: #fee; color: #b00; border: 1px solid #fcc; }
        .success { background: #f4fce3; color: #2f9e44; border: 1px solid #b2f2bb; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        input { padding: 10px; margin-bottom: 15px; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1>FIT Time Shifter</h1>
    <div class="card">
        <label>1. Select .fit file:</label>
        <input type="file" id="fileInput" accept=".fit">
        <label>2. Shift seconds:</label>
        <input type="number" id="offset" value="0">
        <button id="runBtn">Adjust and Download</button>
    </div>

    <div id="statusBox" class="status">Waiting for file...</div>

    <script type="module">
        import { Decoder, Stream, Encoder, Profile } from './index.js?v=final';

        const statusBox = document.getElementById('statusBox');
        const runBtn = document.getElementById('runBtn');

        runBtn.addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const offset = parseInt(document.getElementById('offset').value) || 0;

            if (fileInput.files.length === 0) return alert("Select a file!");
            const file = fileInput.files[0];

            statusBox.innerHTML = "⏳ Decoding file...";
            statusBox.className = "status";

            try {
                const arrayBuffer = await file.arrayBuffer();
                const stream = Stream.fromArrayBuffer(arrayBuffer);
                const decoder = new Decoder(stream);
                
                // 1. Decode EVERYTHING at once
                const { messages, errors } = decoder.read({
                    convertTimestamp: false, 
                    convertUnits: false,
                    expandComponents: false
                });

                if (errors.length > 0) console.warn("Decoder errors:", errors);

                const encoder = new Encoder();
                let count = 0;

                // 2. Loop through the decoded messages dictionary
                // Keys are names like 'recordMesgs', 'lapMesgs', etc.
                for (const key in messages) {
                    // Map name to numeric MesgNum (e.g., 'recordMesgs' -> 20)
                    const baseName = key.replace('Mesgs', '').toUpperCase();
                    const mesgNum = Profile.MesgNum[baseName];

                    if (mesgNum !== undefined) {
                        messages[key].forEach(msg => {
                            // Apply time shift
                            if (msg.timestamp !== undefined) msg.timestamp += offset;
                            if (msg.startTime !== undefined) msg.startTime += offset;
                            if (msg.startDate !== undefined) msg.startDate += offset;

                            // Write to encoder
                            try {
                                encoder.onMesg(mesgNum, msg);
                                count++;
                            } catch (e) {
                                console.warn(`Skipped ${key} message:`, e.message);
                            }
                        });
                    }
                }

                if (count === 0) throw new Error("No valid messages found to encode.");

                // 3. Finalize and Download
                const result = encoder.close();
                const blob = new Blob([result], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `shifted_${file.name}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                statusBox.innerHTML = `✅ Success! Wrote ${count} records.`;
                statusBox.className = "status success";

            } catch (err) {
                console.error("SDK Error:", err);
                statusBox.innerHTML = "❌ Error: " + err.message;
                statusBox.className = "status error";
            }
        });
    </script>
</body>
</html>
