<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIT Editor v3.0 (2026 SDK Fix)</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; background: #f8f9fa; display: flex; flex-direction: column; min-height: 95vh; }
        .card { border: 1px solid #ddd; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: bold; text-align: center; font-size: 0.9rem; }
        .error { background: #fee; color: #d00; border: 1px solid #fcc; }
        .success { background: #efe; color: #2d6a4f; border: 1px solid #cfc; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input { padding: 10px; margin-bottom: 15px; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
        footer { margin-top: auto; text-align: center; color: #888; font-size: 0.75rem; padding: 20px; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <h1>FIT Activity Editor</h1>
    <div class="card">
        <label>1. Select .fit file:</label>
        <input type="file" id="fileInput" accept=".fit">
        <div class="row">
            <div><label>Shift Time (sec):</label><input type="number" id="offset" value="0"></div>
            <div><label>Trim Start (sec):</label><input type="number" id="trimSec" value="0" min="0"></div>
        </div>
        <button id="runBtn">Process and Download</button>
    </div>
    <div id="statusBox" class="status">Ready</div>

    <footer>
        Logic Version: <strong>v3.0 (Full SDK Integration)</strong><br>
        Target: Garmin SDK 21.195.00 / Build 2026
    </footer>

    <script type="module">
        import { Decoder, Stream, Encoder } from './index.js?v=21.195.00';

        document.addEventListener('DOMContentLoaded', () => {
            const statusBox = document.getElementById('statusBox');
            const runBtn = document.getElementById('runBtn');

            runBtn.addEventListener('click', async () => {
                const fileInput = document.getElementById('fileInput');
                if (!fileInput.files || fileInput.files.length === 0) return alert("Select a file.");
                
                // FIX 1: Accessing the specific file object correctly
                const selectedFile = fileInput.files[0]; 
                const offsetValue = parseInt(document.getElementById('offset').value) || 0;
                const trimValue = parseInt(document.getElementById('trimSec').value) || 0;
                
                statusBox.innerHTML = "⏳ Processing...";
                statusBox.className = "status";

                try {
                    const arrayBuffer = await selectedFile.arrayBuffer();
                    const stream = Stream.fromArrayBuffer(arrayBuffer);
                    const decoder = new Decoder(stream);
                    const encoder = new Encoder();
                    
                    let firstTimestamp = null;
                    let distanceOffset = 0;
                    let count = 0;

                    // FIX 2: Satisfying the specific 'if' checks in your decoder.js (Line 144)
                    decoder.read({
                        applyScaleAndOffset: false, // Prevents 100x distance jump
                        mergeHeartRates: false,      // Required because scale is false
                        expandComponents: false,     // Required because scale is false
                        convertDateTimesToDates: false,
                        mesgListener: (mesgNum, message) => {
                            // In this mode, message values are raw integers (e.g. distance in cm)
                            const ts = message.timestamp;
                            if (ts && firstTimestamp === null) firstTimestamp = ts;

                            // 1. Trimming Logic
                            if (trimValue > 0 && ts) {
                                if (ts < (firstTimestamp + trimValue)) {
                                    if (message.distance !== undefined) distanceOffset = message.distance;
                                    return; // Drop record
                                }
                            }

                            // 2. Distance Correction (Raw Integer Math)
                            if (distanceOffset > 0) {
                                if (message.distance !== undefined) {
                                    message.distance = Math.max(0, message.distance - distanceOffset);
                                }
                                // Handle both possible summary naming conventions
                                ['totalDistance', 'total_distance'].forEach(f => {
                                    if (message[f] !== undefined) {
                                        message[f] = Math.max(0, message[f] - distanceOffset);
                                    }
                                });
                            }

                            // 3. Time Shifting
                            ['timestamp', 'startTime', 'startDate', 'localTimestamp', 'start_time'].forEach(f => {
                                if (message[f] !== undefined && typeof message[f] === 'number') {
                                    message[f] += offsetValue;
                                }
                            });

                            // 4. Flattening / Cleaning for the Encoder
                            const cleanMsg = {};
                            for (const key in message) {
                                // Skip SDK metadata and internal unit strings
                                if (key.endsWith('_units') || key.startsWith('unknown') || key.startsWith('$')) continue;
                                cleanMsg[key] = message[key];
                            }

                            try {
                                encoder.onMesg(mesgNum, cleanMsg);
                                count++;
                            } catch (e) {
                                console.warn(`Skipped mesg ${mesgNum}:`, e.message);
                            }
                        }
                    });

                    const finalFit = encoder.close();
                    if (count === 0) throw new Error("No records were found in the file.");

                    const blob = new Blob([finalFit], { type: "application/octet-stream" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `fixed_${selectedFile.name}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    statusBox.innerHTML = `✅ Success! Processed ${count} records.`;
                    statusBox.className = "status success";
                } catch (err) {
                    console.error("SDK Error:", err);
                    statusBox.innerHTML = "❌ Error: " + err.message;
                    statusBox.className = "status error";
                }
            });
        });
    </script>
</body>
</html>
