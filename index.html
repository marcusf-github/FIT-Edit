<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIT Time Shifter</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; background: #f8f9fa; }
        .card { border: 1px solid #ddd; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: bold; text-align: center; }
        .error { background: #fee; color: #d00; border: 1px solid #fcc; }
        .success { background: #efe; color: #2d6a4f; border: 1px solid #cfc; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        input { padding: 10px; margin-bottom: 15px; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>
    <h1>FIT Time Shifter</h1>
    <div class="card">
        <label>1. Select .fit file:</label>
        <input type="file" id="fileInput" accept=".fit">
        <label>2. Shift seconds:</label>
        <input type="number" id="offset" value="0">
        <button id="runBtn">Adjust and Download</button>
    </div>
    <div id="statusBox" class="status">Ready</div>

    <script type="module">
        import { Decoder, Stream, Encoder } from './index.js?v=21.195.00';

        // Wait for DOM to load to prevent "addEventListener of null" error
        document.addEventListener('DOMContentLoaded', () => {
            const statusBox = document.getElementById('statusBox');
            const runBtn = document.getElementById('runBtn');

            runBtn.addEventListener('click', async () => {
                const fileInput = document.getElementById('fileInput');
                const offset = parseInt(document.getElementById('offset').value) || 0;
                
                if (!fileInput.files.length) return alert("Select a file!");
                
                const file = fileInput.files[0];
                statusBox.innerHTML = "⏳ Processing...";
                statusBox.className = "status";

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const stream = Stream.fromArrayBuffer(arrayBuffer);
                    
                    const encoder = new Encoder();
                    let count = 0;

                    // The most robust way: Use the mesgListener callback during decoding
                    // this pipes data directly into the encoder in the correct order
                    const decoder = new Decoder(stream);
                    
                    decoder.read({
                        applyScaleAndOffset: false, // Keep raw for encoder
                        convertDateTimesToDates: false, 
                        convertUnits: false,
                        // This function runs for every single message found
                        mesgListener: (mesgNum, message) => {
                            // Apply time shift to any timestamp field
                            const timeFields = ['timestamp', 'startTime', 'startDate', 'localTimestamp'];
                            timeFields.forEach(f => {
                                if (message[f] !== undefined && typeof message[f] === 'number') {
                                    message[f] += offset;
                                }
                            });

                            // Remove SDK internal helper properties
                            for (const key in message) {
                                if (key.endsWith('_units') || key.startsWith('unknown')) {
                                    delete message[key];
                                }
                            }

                            encoder.onMesg(mesgNum, message);
                            count++;
                        }
                    });

                    const finalFit = encoder.close();
                    
                    if (count === 0) throw new Error("No records were processed.");

                    const blob = new Blob([finalFit], { type: "application/octet-stream" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `shifted_${file.name}`;
                    a.click();

                    statusBox.innerHTML = `✅ Success! Processed ${count} records.`;
                    statusBox.className = "status success";

                } catch (err) {
                    console.error(err);
                    statusBox.innerHTML = "❌ Error: " + err.message;
                    statusBox.className = "status error";
                }
            });
        });
    </script>
</body>
</html>
