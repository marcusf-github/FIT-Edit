<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIT Time Shifter (SDK Fix)</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; background: #f8f9fa; }
        .card { border: 1px solid #ddd; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: bold; text-align: center; font-size: 0.9rem; }
        .error { background: #fee; color: #d00; border: 1px solid #fcc; }
        .success { background: #efe; color: #2d6a4f; border: 1px solid #cfc; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px;}
        input { padding: 10px; margin-bottom: 15px; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>FIT Time Shifter</h1>
    <div class="card">
        <label>1. Select .fit file:</label>
        <input type="file" id="fileInput" accept=".fit">
        <label>2. Shift seconds (e.g., 3600 for +1hr):</label>
        <input type="number" id="offset" value="0">
        <button id="runBtn">Adjust and Download</button>
    </div>
    <div id="statusBox" class="status">Ready</div>

    <script type="module">
        import { Decoder, Stream, Encoder, Profile } from './index.js?v=21.195.00';

        const statusBox = document.getElementById('statusBox');
        const runBtn = document.getElementById('runBtn');

        runBtn.addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const offset = parseInt(document.getElementById('offset').value) || 0;
            
            if (fileInput.files.length === 0) return alert("Select a file!");
            
            const file = fileInput.files[0];
            statusBox.innerHTML = "⏳ Processing...";
            statusBox.className = "status";

            try {
                const arrayBuffer = await file.arrayBuffer();
                const stream = Stream.fromArrayBuffer(arrayBuffer);
                const decoder = new Decoder(stream);
                
                // CRITICAL: We must NOT convert dates or apply scales. 
                // The Encoder.js transformValue() logic prefers raw FIT types.
                const { messages } = decoder.read({
                    convertDateTimesToDates: false,
                    convertUnits: false,
                    expandComponents: false,
                    applyScaleAndOffset: false 
                });

                const encoder = new Encoder();
                let count = 0;

                // The decoder returns messages grouped by name: { record: [...], lap: [...] }
                for (const [mesgName, mesgArray] of Object.entries(messages)) {
                    // Profile.MesgNum contains the mapping (e.g. RECORD: 20)
                    const mesgNum = Profile.MesgNum[mesgName.toUpperCase()];
                    if (mesgNum === undefined) continue;

                    mesgArray.forEach(msg => {
                        // 1. Shift timestamp fields. 
                        // Since we didn't convert to Dates, these are raw seconds since 1989-12-31.
                        const timeFields = ['timestamp', 'startTime', 'startDate', 'localTimestamp'];
                        timeFields.forEach(field => {
                            if (msg[field] !== undefined && typeof msg[field] === 'number') {
                                msg[field] += offset;
                            }
                        });

                        // 2. Clean Message: remove helper properties added by the Decoder
                        // that aren't part of the FIT profile.
                        const cleanMsg = {};
                        for (const key in msg) {
                            // Skip SDK internal helpers and units
                            if (key.startsWith('unknown') || key.endsWith('_units')) continue;
                            
                            const val = msg[key];
                            // Only include valid FIT types: Number, String, BigInt, Boolean
                            if (typeof val === 'number' || typeof val === 'string' || typeof val === 'boolean' || typeof val === 'bigint') {
                                cleanMsg[key] = val;
                            }
                        }

                        try {
                            encoder.onMesg(mesgNum, cleanMsg);
                            count++;
                        } catch (e) {
                            console.warn(`Dropped ${mesgName} record:`, e.message, cleanMsg);
                        }
                    });
                }

                const finalFit = encoder.close();
                
                if (count === 0) throw new Error("The Encoder rejected every record. Check console (F12).");

                const blob = new Blob([finalFit], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `shifted_${file.name}`;
                a.click();

                statusBox.innerHTML = `✅ Success! Wrote ${count} records.`;
                statusBox.className = "status success";

            } catch (err) {
                console.error("Full Error Context:", err);
                statusBox.innerHTML = "❌ Error: " + err.message;
                statusBox.className = "status error";
            }
        });
    </script>
</body>
</html>
