<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FIT Time Shifter (Final Fix)</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; line-height: 1.5; max-width: 700px; margin: 0 auto; }
        .card { border: 1px solid #ddd; padding: 25px; border-radius: 12px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
        .error { background: #fff0f0; color: #d00; border: 1px solid #fcc; }
        .success { background: #f0fff4; color: #2d6a4f; border: 1px solid #b7e4c7; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        input { padding: 10px; margin-bottom: 15px; width: 100%; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1>FIT Time Shifter</h1>
    <div class="card">
        <label>1. Select .fit file:</label>
        <input type="file" id="fileInput" accept=".fit">

        <label>2. Shift time (seconds):</label>
        <input type="number" id="offset" value="0">
        
        <button id="runBtn">Process & Download</button>
    </div>

    <div id="statusBox" class="status">Initializing SDK...</div>

    <script type="module">
        import { Decoder, Stream, Encoder } from './index.js?v=final';

        const statusBox = document.getElementById('statusBox');
        const runBtn = document.getElementById('runBtn');

        // Verify SDK files are reachable
        if (Decoder && Encoder) {
            statusBox.innerHTML = "✅ SDK Ready";
            statusBox.className = "status success";
        } else {
            statusBox.innerHTML = "❌ SDK Error: Files missing in /src folder";
            statusBox.className = "status error";
        }

        runBtn.addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const offset = parseInt(document.getElementById('offset').value) || 0;

            if (fileInput.files.length === 0) return alert("Select a file first.");

            runBtn.disabled = true;
            statusBox.innerHTML = "⏳ Processing... (Check Console F12 for details)";
            statusBox.className = "status";

            try {
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                const stream = Stream.fromArrayBuffer(arrayBuffer);
                const decoder = new Decoder(stream);
                const encoder = new Encoder();

                let count = 0;

                // CRITICAL: We use 'mesgListener' to intercept messages as they are decoded
                // This ensures we get RAW numeric data that the encoder can immediately accept
                decoder.read({
                    mesgListener: (mesgNum, message) => {
                        // 1. Shift timestamps in the raw message object
                        if (message.timestamp !== undefined) message.timestamp += offset;
                        if (message.startTime !== undefined) message.startTime += offset;
                        if (message.startDate !== undefined) message.startDate += offset;

                        // 2. Direct write to encoder
                        // Use onMesg(mesgNum, message) for maximum compatibility
                        encoder.onMesg(mesgNum, message);
                        count++;
                    }
                });

                console.log(`Processed ${count} messages.`);

                if (count === 0) throw new Error("No data found in file.");

                // 3. Close & Finalize
                const result = encoder.close();
                
                // If result is small (< 100 bytes), something went wrong with the write
                if (result.length < 100) throw new Error("Encoder failed to write data records.");

                const blob = new Blob([result], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `shifted_${file.name}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                statusBox.innerHTML = `✅ Done! Wrote ${count} records. File size: ${(result.length/1024).toFixed(1)} KB`;
                statusBox.className = "status success";

            } catch (err) {
                console.error("SDK Error:", err);
                statusBox.innerHTML = "❌ Error: " + err.message;
                statusBox.className = "status error";
            } finally {
                runBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
