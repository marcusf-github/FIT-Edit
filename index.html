<!DOCTYPE html>
<html>
<head>
    <title>FIT Time Shifter (Deep Clean)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; line-height: 1.5; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        .status { margin-top: 20px; padding: 10px; border-radius: 4px; font-weight: bold; }
        .error { background: #fee; color: #b00; }
        .success { background: #efe; color: #080; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>FIT Time Shifter</h2>
    <div class="card">
        <input type="file" id="fileInput" accept=".fit"><br><br>
        <label>Shift (seconds): </label>
        <input type="number" id="offset" value="0"><br><br>
        <button id="runBtn">Shift & Download</button>
    </div>
    <div id="status" class="status">Ready</div>

    <script type="module">
        // Import Profile to get the list of "Legal" fields
        import { Decoder, Stream, Encoder, Profile } from './index.js?v=deepclean';

        const status = document.getElementById('status');
        const runBtn = document.getElementById('runBtn');

        runBtn.addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const offset = parseInt(document.getElementById('offset').value) || 0;
            if (!fileInput.files[0]) return alert("Select a file!");

            status.innerText = "Processing...";
            status.className = "status";

            try {
                const arrayBuffer = await fileInput.files[0].arrayBuffer();
                const stream = Stream.fromArrayBuffer(arrayBuffer);
                const decoder = new Decoder(stream);
                const encoder = new Encoder();
                let count = 0;

                decoder.read({
                    convertTimestamp: false,
                    convertUnits: false,
                    mesgListener: (mesgNum, message) => {
                        // 1. Shift Timestamps
                        if (message.timestamp !== undefined) message.timestamp += offset;
                        if (message.startTime !== undefined) message.startTime += offset;
                        if (message.startDate !== undefined) message.startDate += offset;

                        // 2. THE HARD FILTER:
                        // Get the list of valid field names for this specific message type
                        const validFields = Profile.getMesg(mesgNum).fields;
                        const cleanMsg = { mesgNum: mesgNum };

                        // 3. Only copy fields that exist in the OFFICIAL Garmin Profile
                        // This ignores all Strava "developer" and "enhanced" junk
                        for (const fieldName in message) {
                            if (validFields[fieldName] !== undefined) {
                                // Double check it's a simple value (no objects/metadata)
                                const val = message[fieldName];
                                if (typeof val !== 'object' || val === null) {
                                    cleanMsg[fieldName] = val;
                                }
                            }
                        }

                        try {
                            encoder.onMesg(cleanMsg);
                            count++;
                        } catch (e) {
                            // Silently skip any record that is still "too dirty"
                        }
                    }
                });

                const result = encoder.close();
                if (count === 0) throw new Error("No valid records found.");

                const blob = new Blob([result], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "shifted_" + fileInput.files[0].name;
                a.click();

                status.innerText = `Success! Wrote ${count} records.`;
                status.className = "status success";
            } catch (err) {
                status.innerText = "Error: " + err.message;
                status.className = "status error";
            }
        });
    </script>
</body>
</html>
